name: Sync to Module repo

on:
  push:
    branches: [ "master" ]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Clone Module repo
        run: |
          git clone https://x-access-token:${{ secrets.MODULE_REPO_TOKEN }}@github.com/Xposed-Modules-Repo/cc.meteormc.yourmiui.git ModuleRepo

      - name: Copy & Modify file
        run: |
          README_FILE="README.md"
          cp "$README_FILE" ModuleRepo/$README_FILE
          cd ModuleRepo

          SOURCE_LINK="## [🔗 源码仓库](https://github.com/Meteor2333/YourMIUI)"
          sed -i "s|<!-- Source Link -->|$SOURCE_LINK|" "$README_FILE"

      - name: Commit & Push to Module repo
        run: |
          cd ModuleRepo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync README.md file" || echo "No changes"
          git push
