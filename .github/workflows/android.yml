name: Android CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: printf "%s" "${{ secrets.SIGNING_KEY }}" | base64 -d > ${{ runner.temp }}/keystore.jks

    - name: Generate keystore properties
      run: |
        cat <<EOF > keystore.properties
        storeFile=${{ runner.temp }}/keystore.jks
        storePassword=${{ secrets.KEY_STORE_PASSWORD }}
        keyAlias=${{ secrets.ALIAS }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        EOF

    - name: Build with Gradle
      run: ./gradlew build

    - name: Collect artifact
      id: collect_artifact
      run: |
        outputs_dir="outputs"
        sudo mkdir -p "$outputs_dir"
        find app/build/outputs/apk -type f -name "*.apk" -exec sudo cp {} "$outputs_dir" \;
        echo "apk_outputs=$outputs_dir" >> $GITHUB_OUTPUT
        
    - name: Use short hash
      id: use_hash
      run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ github.event.repository.name }}-${{ steps.use_hash.outputs.short_sha }}
        path: ${{ steps.collect_artifact.outputs.apk_outputs }}

    - name: Rename APKs
      if: github.ref_type == 'tag'
      run: |
        outputs_dir="${{ steps.collect_artifact.outputs.apk_outputs }}"
        project_name="${{ github.event.repository.name }}"
        tag="${{ github.ref_name }}"

        for file in ${outputs_dir}/*.apk; do
          filename=$(basename "$file")
          suffix=${filename#app-}
          suffix=${suffix%.apk}
          new_name="${project_name}-${tag}-${suffix}.apk"
          sudo mv "$file" "${outputs_dir}/${new_name}"
        done
        
    - name: Release Changelog Builder
      id: release_chanagelog
      if: github.ref_type == 'tag'
      uses: mikepenz/release-changelog-builder-action@v6.1.1

    - name: Github release
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: ${{ steps.collect_artifact.outputs.apk_outputs }}/*.apk
        body: ${{ steps.release_chanagelog.outputs.changelog }}
