name: Bug report (English)
description: Report issues to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: "A clear and concise description of what the bug is."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expectation
    attributes:
      label: Expected behavior
      placeholder: "A clear and concise description of what you expected to happen."
    validations:
      required: false

  - type: input
    attributes:
      label: Device
      placeholder: "Xiaomi 13"
    validations:
      required: true

  - type: input
    attributes:
      label: OS
      placeholder: "MIUI14.0.31.0.TMCCNXM"
    validations:
      required: true

  - type: input
    attributes:
      label: Module version
      placeholder: "1.0"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Framework name
      options:
        - "LSPosed"
        - "LSPatch"
        - "EdXposed"
    validations:
      required: true

  - type: upload
    attributes:
      label: Logs
      description: "Add module logs about the problem here."
    validations:
      required: true

  - type: upload
    attributes:
      label: Screenshots(optional)
      description: "If applicable, add screenshots about the problem here."
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional(optional)
      description: "If applicable, add any other context about the problem here."
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Final check
      description: "Please complete the checklist below to ensure sufficient information is provided."
      options:
        - label: "I agree to check existing issues before submitting this report."
          required: true
        - label: "I confirm that I have filled out this template carefully and provided all required information."
          required: true
        - label: "I understand that issues not following the guidelines above may be closed."
          required: true